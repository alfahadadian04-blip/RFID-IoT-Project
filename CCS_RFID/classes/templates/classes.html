{% extends "base.html" %}

{% block content %}
<div class="font-sans min-h-screen flex items-center justify-center p-8">
  <div class="bg-white rounded-xl p-7 w-full max-w-[820px] shadow-lg">
    <!-- Header -->
    <div class="flex items-start justify-between mb-5">
      <div>
        <h1 class="text-2xl font-bold text-gray-900">Class Schedule</h1>
        <p class="text-xs text-gray-500 mt-0.5">Manage your weekly class schedule (Working Hours: 6:00 AM - 7:00 PM)</p>
      </div>
      <button class="bg-maroon hover:bg-maroon-dark text-white border-none rounded-md px-[18px] py-2.5 text-xs font-semibold whitespace-nowrap transition-colors cursor-pointer shadow-sm hover:shadow">
        Add Class Schedule
      </button>
    </div>

    <!-- Schedule Table -->
    <div class="w-full overflow-x-auto">
      <table class="w-full border-collapse border border-gray-300 rounded-lg overflow-hidden text-sm">
        <!-- Table Header -->
        <thead>
          <tr>
            <th class="bg-gray-100 text-xs font-semibold text-gray-700 p-2.5 border border-gray-300 w-20"></th>
            <th class="bg-gray-100 text-xs font-semibold text-gray-700 p-2.5 border border-gray-300">Monday</th>
            <th class="bg-gray-100 text-xs font-semibold text-gray-700 p-2.5 border border-gray-300">Tuesday</th>
            <th class="bg-gray-100 text-xs font-semibold text-gray-700 p-2.5 border border-gray-300">Wednesday</th>
            <th class="bg-gray-100 text-xs font-semibold text-gray-700 p-2.5 border border-gray-300">Thursday</th>
            <th class="bg-gray-100 text-xs font-semibold text-gray-700 p-2.5 border border-gray-300">Friday</th>
            <th class="bg-gray-100 text-xs font-semibold text-gray-700 p-2.5 border border-gray-300">Saturday</th>
          </tr>
        </thead>
        
        <!-- Table Body -->
        <tbody id="scheduleBody"></tbody>
      </table>
    </div>
  </div>
</div>

<script>
  (function() {
    const timeSlots = [
      "6:00 AM", "7:00 AM", "8:00 AM", "9:00 AM",
      "10:00 AM", "11:00 AM", "12:00 PM", "1:00 PM",
      "2:00 PM", "3:00 PM", "4:00 PM", "5:00 PM", "6:00 PM"
    ];

    const days = ["Monday", "Tuesday", "Wednesday", "Thursday", "Friday", "Saturday"];

    // Sample class data - add your classes here
    const classes = [
      // { day: "Monday", timeIndex: 2, subject: "Mathematics 101", room: "Room 101", color: "bg-maroon" },
      // { day: "Wednesday", timeIndex: 4, subject: "Physics 201", room: "Room 203", color: "bg-blue-600" },
      // { day: "Friday", timeIndex: 6, subject: "English Lit", room: "Room 305", color: "bg-green-600" },
    ];

    const tbody = document.getElementById("scheduleBody");
    if (!tbody) return;

    // Clear any existing content
    tbody.innerHTML = '';

    timeSlots.forEach((time, tIdx) => {
      const tr = document.createElement("tr");

      // Time cell
      const timeTd = document.createElement("td");
      timeTd.className = "bg-gray-200 text-xs text-gray-700 font-medium p-2 h-[52px] align-middle text-center border border-gray-300 w-20";
      timeTd.textContent = time;
      tr.appendChild(timeTd);

      // Day cells
      days.forEach(day => {
        const td = document.createElement("td");
        td.className = "h-[52px] p-1 align-top relative min-w-[90px] border border-gray-300 bg-white";

        const match = classes.find(c => c.day === day && c.timeIndex === tIdx);
        if (match) {
          const div = document.createElement("div");
          div.className = "bg-maroon text-white rounded-md p-1 text-[10px] font-semibold leading-tight cursor-pointer absolute inset-x-1 top-1 z-10 shadow-sm hover:shadow-md transition";
          div.innerHTML = `${match.subject}<br><span class="font-normal text-[9px] opacity-85">${match.room}</span>`;
          td.appendChild(div);
        }

        tr.appendChild(td);
      });

      tbody.appendChild(tr);
    });

    // Footer row (7:00 PM)
    const footerTr = document.createElement("tr");
    footerTr.className = "footer-row";
    
    const footerFirst = document.createElement("td");
    footerFirst.className = "bg-gray-200 text-xs text-gray-700 font-medium p-2 h-8 align-middle text-center border border-gray-300";
    footerFirst.textContent = "7:00 PM";
    footerTr.appendChild(footerFirst);
    
    for (let i = 0; i < 6; i++) {
      const td = document.createElement("td");
      td.className = "bg-white h-8 text-xs text-gray-400 text-center p-2 border border-gray-300";
      footerTr.appendChild(td);
    }
    
    tbody.appendChild(footerTr);
  })();
</script>
{% endblock %}
